name: SCM Logistics News Agent

on:
  schedule:
    - cron: '0 23 * * 0-4'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

env:
  TZ: Asia/Seoul

jobs:
  crawl-search-summarize-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk fontconfig
          fc-cache -f -v
          echo "==== Installed Korean fonts ===="
          fc-list | grep -i "Nanum\|Noto Sans CJK" | head -50 || true

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install google-api-python-client requests beautifulsoup4 matplotlib

      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run existing crawlers
        continue-on-error: true
        run: python pipeline/run_crawlers.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Crawl freight indices
        continue-on-error: true
        run: python pipeline/crawl_freight_indices.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run web search by themes
        run: python pipeline/search_news.py
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Merge and deduplicate
        run: python pipeline/merge_news.py

      - name: Summarize with Gemini Flash
        run: python pipeline/summarize_news.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Push to Telegram
        run: python pipeline/send_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Send Email Briefing
        run: python pipeline/send_email.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Save results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p data/$(date +%Y/%m)
          cp pipeline/output/*.json data/$(date +%Y/%m)/

          git add data/
          git diff --staged --quiet || git commit -m "📰 뉴스 데이터 $(date +%Y-%m-%d_%H:%M)"
          git push
